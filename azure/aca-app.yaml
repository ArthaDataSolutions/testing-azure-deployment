# az containerapp create / update template
# Apply with:  az containerapp create -g $RESOURCE_GROUP --yaml azure/aca-app.yaml
# Update with: az containerapp update -g $RESOURCE_GROUP -n $APP_NAME --yaml azure/aca-app.yaml
location: $LOCATION
name: $APP_NAME
resourceGroup: $RESOURCE_GROUP
properties:
  managedEnvironmentId: $ACA_ENV_ID
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: false           # internal-only job; flip to true if you expose an HTTP endpoint
      targetPort: 8080
      transport: auto
    registries:
      - server: $ACR_LOGIN_SERVER
        username: $ACR_USER
        passwordSecretRef: acr-password
    secrets:
      - name: acr-password
        value: $ACR_PASSWORD
      # Add additional secrets here (DB password, OAuth client secrets, etc.) and
      # reference them via `secretRef` in the env block below.
  template:
    containers:
      - image: $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
        name: $APP_NAME
        resources:
          cpu: 0.5
          memory: 1.0Gi
        env:
          # ── populate from your env / Key Vault ──────────────────────────
          # - name: CRM_CLIENT_SECRET
          #   secretRef: crm-client-secret
          # - name: DW_POSTGRES_PASSWORD
          #   secretRef: dw-postgres-password
    scale:
      minReplicas: 0
      maxReplicas: 1
